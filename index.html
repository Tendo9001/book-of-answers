document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

acity: 0.75; } 100% { opacity: 0; transform: translate(-50%,-50%) scale(2.4); } }\n  @keyframes auroraA { 0%,100% { transform: translate(-8%,0) scale(1); } 50% { transform: translate(10%,6%) scale(1.18); } }\n  @keyframes auroraB { 0%,100% { transform: translate(6%,4%) scale(1.1); } 50% { transform: translate(-10%,-6%) scale(0.92); } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div data-screen-label=\"The Book of Answers\" style=\"position:relative; min-height:100vh; width:100%; overflow:hidden; background:#08121F; font-family:'Manrope',system-ui,sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:64px 22px;\">\n\n  <!-- gradient glow washes -->\n  <div style=\"position:absolute; top:-18%; left:50%; transform:translateX(-50%); width:140vw; height:70vh; background:radial-gradient(closest-side, rgba(122,92,214,0.22), rgba(122,92,214,0) 70%); pointer-events:none; animation:floatGlow 16s ease-in-out infinite;\"><\u002Fdiv>\n  <div style=\"position:absolute; bottom:-22%; right:-10%; width:80vw; height:60vh; background:radial-gradient(closest-side, rgba(214,183,120,0.12), rgba(214,183,120,0) 70%); pointer-events:none; animation:floatGlow 20s ease-in-out infinite reverse;\"><\u002Fdiv>\n  <div style=\"position:absolute; inset:0; background:radial-gradient(120% 90% at 50% 0%, rgba(20,34,56,0.6), rgba(8,18,31,0) 55%); pointer-events:none;\"><\u002Fdiv>\n\n  <!-- aurora / nebula -->\n  <div style=\"position:absolute; inset:-10%; pointer-events:none; filter:blur(30px); mix-blend-mode:screen;\">\n    <div style=\"position:absolute; top:8%; left:6%; width:60vw; height:52vh; background:radial-gradient(closest-side, rgba(88,120,214,0.18), rgba(88,120,214,0) 70%); animation:auroraA 26s ease-in-out infinite;\"><\u002Fdiv>\n    <div style=\"position:absolute; bottom:2%; right:0%; width:64vw; height:54vh; background:radial-gradient(closest-side, rgba(150,96,210,0.16), rgba(150,96,210,0) 70%); animation:auroraB 32s ease-in-out infinite;\"><\u002Fdiv>\n    <div style=\"position:absolute; top:30%; left:35%; width:46vw; height:40vh; background:radial-gradient(closest-side, rgba(72,170,180,0.10), rgba(72,170,180,0) 70%); animation:auroraA 38s ease-in-out infinite reverse;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- constellation + trail + burst canvas -->\n  <canvas ref=\"{{ canvasRef }}\" style=\"position:absolute; inset:0; width:100%; height:100%; z-index:1; pointer-events:none;\"><\u002Fcanvas>\n\n  <!-- starfield -->\n  <div style=\"position:absolute; inset:0; pointer-events:none;\">\n    <sc-for list=\"{{ stars }}\" as=\"s\" hint-placeholder-count=\"40\">\n      <div style=\"{{ s.style }}\"><\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <!-- floating particles -->\n  <div style=\"position:absolute; inset:0; pointer-events:none;\">\n    <sc-for list=\"{{ particles }}\" as=\"p\" hint-placeholder-count=\"12\">\n      <div style=\"{{ p.style }}\"><\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- LANDING CONTENT -->\n  <div style=\"position:relative; z-index:2; width:100%; max-width:560px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:14px;\">\n\n    <div style=\"display:flex; flex-direction:column; align-items:center; gap:20px; margin-bottom:8px;\">\n      <div style=\"display:flex; align-items:center; gap:9px; padding:7px 15px; border:1px solid rgba(214,183,120,0.28); border-radius:100px; background:rgba(214,183,120,0.05); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);\">\n        <span style=\"width:5px; height:5px; border-radius:50%; background:#D6B778; box-shadow:0 0 10px 2px rgba(214,183,120,0.7);\"><\u002Fspan>\n        <span style=\"font-size:11px; letter-spacing:0.28em; text-transform:uppercase; color:rgba(214,183,120,0.85); font-weight:500;\">A moment of reflection<\u002Fspan>\n      <\u002Fdiv>\n\n      <h1 style=\"margin:0; font-family:'Cormorant Garamond',Georgia,serif; font-weight:500; font-size:clamp(46px,13vw,78px); line-height:1.02; letter-spacing:-0.01em; background:linear-gradient(180deg,#FBF7EE 0%,#EAD9AE 55%,#C7A867 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; text-shadow:0 0 60px rgba(214,183,120,0.15);\">The Book<br>of Answers<\u002Fh1>\n\n      <p style=\"margin:0; font-family:'Cormorant Garamond',Georgia,serif; font-style:italic; font-size:clamp(19px,5vw,24px); line-height:1.5; color:rgba(226,232,242,0.72); max-width:340px;\">Some answers are not found.<br>They are revealed.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- primary action -->\n    <div style=\"width:100%; margin-top:30px; display:flex; flex-direction:column; align-items:center; gap:18px;\">\n      <button onclick=\"{{ reveal }}\" style=\"border:none; cursor:pointer; border-radius:100px; padding:19px 42px; font-family:'Manrope',sans-serif; font-size:16px; font-weight:600; letter-spacing:0.03em; color:#1A1305; background:linear-gradient(180deg,#F0DDAF,#D6B778 60%,#C29E5A); animation:pulseBtn 3.4s ease-in-out infinite; display:flex; align-items:center; justify-content:center; gap:10px;\">\n        <span style=\"font-size:16px;\">✦<\u002Fspan> Reveal My Answer\n      <\u002Fbutton>\n\n      <!-- optional question -->\n      <sc-if value=\"{{ showInput }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"width:100%; max-width:420px; border-radius:22px; padding:16px 16px; background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)); border:1px solid rgba(255,255,255,0.11); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); box-shadow:0 24px 60px -30px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.12); animation:riseUp 0.5s ease both;\">\n          <textarea value=\"{{ question }}\" oninput=\"{{ onQuestion }}\" rows=\"2\" placeholder=\"What is on your mind today?\" style=\"width:100%; resize:none; border:none; outline:none; background:rgba(0,0,0,0.18); border:1px solid rgba(255,255,255,0.10); border-radius:14px; padding:14px 15px; color:#F3F6FB; font-family:'Manrope',sans-serif; font-size:16px; line-height:1.5; font-weight:400;\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <button onclick=\"{{ toggleInput }}\" style=\"border:none; background:transparent; cursor:pointer; display:flex; align-items:center; gap:7px; padding:4px 8px; font-family:'Manrope',sans-serif; font-size:13px; font-weight:500; letter-spacing:0.03em; color:rgba(226,232,242,0.42);\">\n        <span style=\"font-size:14px; line-height:1;\">{{ inputToggleIcon }}<\u002Fspan> {{ inputToggleLabel }}\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <p style=\"margin:20px 0 0; font-size:12px; color:rgba(226,232,242,0.30); letter-spacing:0.04em;\">Close your eyes. Breathe. Then let the page turn.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- REVEAL OVERLAY -->\n  <sc-if value=\"{{ showOverlay }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 22px; background:radial-gradient(120% 100% at 50% 40%, rgba(14,22,38,0.86), rgba(4,9,16,0.97)); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); animation:fadeIn 0.6s ease both;\">\n\n      <!-- mute toggle -->\n      <button onclick=\"{{ toggleMute }}\" title=\"{{ muteLabel }}\" style=\"position:absolute; top:20px; right:20px; z-index:5; width:42px; height:42px; border-radius:50%; cursor:pointer; border:1px solid rgba(255,255,255,0.14); background:rgba(255,255,255,0.06); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); color:rgba(243,246,251,0.85); font-size:16px; display:flex; align-items:center; justify-content:center;\">{{ muteIcon }}<\u002Fbutton>\n\n      <!-- halo behind card -->\n      <div style=\"position:absolute; top:38%; left:50%; width:min(78vw,420px); height:min(78vw,420px); border-radius:50%; background:radial-gradient(closest-side, rgba(214,183,120,0.22), rgba(122,92,214,0.10) 55%, rgba(0,0,0,0) 72%); animation:haloPulse 3.6s ease-in-out infinite; pointer-events:none;\"><\u002Fdiv>\n\n      <!-- light ripple on reveal -->\n      <sc-if value=\"{{ answerReady }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute; top:38%; left:50%; width:min(70vw,360px); height:min(70vw,360px); border-radius:50%; border:1.5px solid rgba(214,183,120,0.6); box-shadow:0 0 40px 6px rgba(214,183,120,0.25); pointer-events:none; animation:rippleExpand 1.5s cubic-bezier(0.2,0.7,0.2,1) forwards;\"><\u002Fdiv>\n        <div style=\"position:absolute; top:38%; left:50%; width:min(70vw,360px); height:min(70vw,360px); border-radius:50%; border:1px solid rgba(180,150,230,0.4); pointer-events:none; animation:rippleExpand 1.7s cubic-bezier(0.2,0.7,0.2,1) 0.12s forwards;\"><\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- opening book with page riffle -->\n      <div style=\"position:relative; z-index:2; width:min(80vw,320px); height:min(114vw,450px); perspective:2100px; animation:cardRise 1.1s cubic-bezier(0.22,1,0.36,1) both;\">\n        <div style=\"position:relative; width:100%; height:100%; transform-style:preserve-3d;\">\n\n          <!-- page thickness on the right edge -->\n          <div style=\"position:absolute; top:7px; bottom:7px; right:-9px; width:15px; border-radius:2px 5px 5px 2px; background:repeating-linear-gradient(180deg,#ECE3CD,#ECE3CD 2px,#D6C9A9 2px,#D6C9A9 4px); box-shadow:0 22px 44px -14px rgba(0,0,0,0.6);\"><\u002Fdiv>\n\n          <!-- base page (holds the answer) -->\n          <div style=\"position:absolute; inset:0; transform:translateZ(0px); border-radius:6px 14px 14px 6px; background:linear-gradient(160deg, rgba(28,24,48,0.97), rgba(13,18,32,0.98)); border:1px solid rgba(214,183,120,0.3); box-shadow:0 44px 96px -30px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,255,255,0.07), inset 26px 0 46px -32px rgba(0,0,0,0.85); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; text-align:center;\">\n            <div style=\"position:absolute; inset:12px; border:1px solid rgba(214,183,120,0.16); border-radius:8px; pointer-events:none;\"><\u002Fdiv>\n            <sc-if value=\"{{ answerReady }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; flex-direction:column; align-items:center; gap:15px;\">\n                <div style=\"font-size:10px; letter-spacing:0.32em; text-transform:uppercase; color:rgba(214,183,120,0.7); opacity:0; animation:charIn 0.6s ease 0.05s forwards;\">The Answer · 答案<\u002Fdiv>\n                <div style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:clamp(32px,9vw,44px); line-height:1.1; text-align:center;\">\n                  <sc-for list=\"{{ enWords }}\" as=\"w\" hint-placeholder-count=\"2\"><span style=\"{{ w.style }}\"><sc-for list=\"{{ w.letters }}\" as=\"c\"><span style=\"{{ c.style }}\">{{ c.ch }}<\u002Fspan><\u002Fsc-for><\u002Fspan><\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"width:34px; height:1px; background:rgba(214,183,120,0.4); opacity:0; animation:charIn 0.6s ease {{ dividerDelay }} forwards;\"><\u002Fdiv>\n                <div style=\"font-family:'Noto Serif SC','Songti SC',serif; font-weight:600; font-size:clamp(23px,6.6vw,30px); letter-spacing:0.14em; display:flex; flex-wrap:wrap; justify-content:center;\">\n                  <sc-for list=\"{{ zhChars }}\" as=\"c\" hint-placeholder-count=\"4\"><span style=\"{{ c.style }}\">{{ c.ch }}<\u002Fspan><\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- riffling pages (turn one after another) -->\n          <sc-for list=\"{{ flipPages }}\" as=\"pg\" hint-placeholder-count=\"5\">\n            <div style=\"{{ pg.style }}\">\n              <div style=\"position:absolute; inset:0; border-radius:6px 12px 12px 6px; background:linear-gradient(160deg, rgba(26,23,44,0.99), rgba(14,19,33,0.99)); border:1px solid rgba(214,183,120,0.16); box-shadow:inset 14px 0 30px -22px rgba(0,0,0,0.9);\">\n                <div style=\"position:absolute; left:0; top:0; bottom:0; width:10px; background:linear-gradient(90deg, rgba(0,0,0,0.4), rgba(0,0,0,0));\"><\u002Fdiv>\n                <div style=\"position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:30px; height:30px; border:1px solid rgba(214,183,120,0.25); border-radius:50%; display:flex; align-items:center; justify-content:center; color:rgba(214,183,120,0.4); font-family:'Cormorant Garamond',serif; font-size:15px;\">✦<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <!-- front cover, turns first -->\n          <div style=\"position:absolute; inset:0; transform-origin:left center; transform-style:preserve-3d; transition:transform 0.42s cubic-bezier(0.45,0,0.3,1); transform:{{ coverTransform }};\">\n            <div style=\"position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:6px 14px 14px 6px; background:linear-gradient(155deg,#15263F 0%,#0B1526 60%,#0A1120 100%); border:1px solid rgba(214,183,120,0.4); box-shadow:0 44px 96px -30px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.08); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;\">\n              <div style=\"position:absolute; left:0; top:0; bottom:0; width:13px; border-radius:6px 0 0 6px; background:linear-gradient(90deg, rgba(0,0,0,0.45), rgba(255,255,255,0.05));\"><\u002Fdiv>\n              <div style=\"position:absolute; inset:10px; border:1px solid rgba(214,183,120,0.24); border-radius:9px; pointer-events:none;\"><\u002Fdiv>\n              <div style=\"position:relative; width:76px; height:76px; display:flex; align-items:center; justify-content:center;\">\n                <div style=\"position:absolute; inset:0; border:1px solid rgba(214,183,120,0.5); border-radius:50%; animation:emblemSpin 22s linear infinite;\"><\u002Fdiv>\n                <div style=\"position:absolute; inset:12px; border:1px solid rgba(122,92,214,0.5); border-radius:50%; animation:emblemSpin 16s linear infinite reverse;\"><\u002Fdiv>\n                <span style=\"font-family:'Cormorant Garamond',serif; font-size:30px; color:#E4CE96;\">✦<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-family:'Cormorant Garamond',serif; font-size:20px; letter-spacing:0.12em; color:rgba(226,232,242,0.78); text-align:center; line-height:1.35;\">THE BOOK<br>OF ANSWERS<br><span style=\"font-family:'Noto Serif SC','Songti SC',serif; font-weight:500; font-size:16px; letter-spacing:0.3em; color:rgba(214,183,120,0.75);\">答案之书<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; transform:rotateY(180deg); border-radius:14px 6px 6px 14px; background:linear-gradient(200deg,#0F1628,#0A1018); border:1px solid rgba(214,183,120,0.2); box-shadow:inset 0 0 60px rgba(0,0,0,0.6);\">\n              <div style=\"position:absolute; inset:12px; border:1px solid rgba(214,183,120,0.12); border-radius:8px;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- reflection + actions -->\n      <sc-if value=\"{{ showReflection }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:relative; z-index:2; margin-top:34px; width:100%; max-width:420px; display:flex; flex-direction:column; align-items:center; gap:26px;\">\n          <div style=\"display:flex; flex-direction:column; align-items:center; gap:12px; animation:riseUp 0.9s ease 0.05s both;\">\n            <p style=\"margin:0; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(18px,4.8vw,22px); line-height:1.55; color:rgba(226,232,242,0.82); text-align:center;\">{{ reflectionEn }}<\u002Fp>\n            <p style=\"margin:0; font-family:'Noto Serif SC','Songti SC',serif; font-weight:400; font-size:clamp(14px,3.8vw,17px); line-height:2; color:rgba(226,232,242,0.62); text-align:center; letter-spacing:0.08em;\">{{ reflectionZh }}<\u002Fp>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; flex-wrap:wrap; gap:10px; justify-content:center; animation:riseUp 0.9s ease 0.18s both;\">\n            <button onclick=\"{{ askAgain }}\" style=\"cursor:pointer; border:none; border-radius:100px; padding:14px 22px; font-family:'Manrope',sans-serif; font-size:14px; font-weight:600; color:#1A1305; background:linear-gradient(180deg,#F0DDAF,#D6B778 60%,#C29E5A); box-shadow:0 12px 30px -10px rgba(214,183,120,0.5);\">Ask Again<\u002Fbutton>\n            <button onclick=\"{{ saveAnswer }}\" style=\"cursor:pointer; border:1px solid rgba(255,255,255,0.16); border-radius:100px; padding:14px 22px; font-family:'Manrope',sans-serif; font-size:14px; font-weight:500; color:rgba(243,246,251,0.9); background:rgba(255,255,255,0.06); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);\">Save Answer<\u002Fbutton>\n            <button onclick=\"{{ shareImage }}\" style=\"cursor:pointer; border:1px solid rgba(255,255,255,0.16); border-radius:100px; padding:14px 22px; font-family:'Manrope',sans-serif; font-size:14px; font-weight:500; color:rgba(243,246,251,0.9); background:rgba(255,255,255,0.06); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);\">Share Image<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- toast -->\n      <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ '' }}\">\n        <div style=\"position:fixed; bottom:34px; left:50%; transform:translateX(-50%); z-index:30; padding:12px 20px; border-radius:100px; background:rgba(20,28,46,0.9); border:1px solid rgba(214,183,120,0.3); color:#EAD9AE; font-size:13px; letter-spacing:0.04em; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); box-shadow:0 16px 40px -12px rgba(0,0,0,0.7); animation:riseUp 0.4s ease both;\">{{ toast }}<\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:860},&quot;particleDensity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1,&quot;min&quot;:0.3,&quot;max&quot;:2,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Atmosphere&quot;}}\">\nclass Component extends DCLogic {\n  PAGES = 10; // cover + leaves that riffle by fast\n\n  state = { phase: 'landing', flips: 0, showReflection: false, question: '', answerEn: '', answerZh: '', reflectionEn: '', reflectionZh: '', toast: '', showInput: false, muted: (() => { try { return localStorage.getItem('boa_muted') === '1'; } catch (e) { return false; } })() };\n\n  toggleInput = () => this.setState(s => ({ showInput: !s.showInput }));\n\n  // [ answerEn, answerZh, reflectionEn, reflectionZh ]\n  ANSWERS = [\n    ['Wait.', '\\u7B49\\u5F85\\u3002', 'Sometimes waiting is not delaying your life. It is preparing it.', '\\u6709\\u65F6\\u5019\\uFF0C\\u7B49\\u5F85\\u4E0D\\u662F\\u5728\\u62D6\\u5EF6\\u4F60\\u7684\\u4EBA\\u751F\\uFF0C\\u800C\\u662F\\u5728\\u4E3A\\u5B83\\u9187\\u917F\\u3002'],\n    ['Let go.', '\\u653E\\u4E0B\\u3002', 'What is meant to stay will not need to be held so tightly.', '\\u771F\\u6B63\\u5C5E\\u4E8E\\u4F60\\u7684\\uFF0C\\u65E0\\u9700\\u7D27\\u7D27\\u6522\\u4F4F\\u3002'],\n    ['Begin.', '\\u5F00\\u59CB\\u3002', 'The first step is rarely the hardest. It is only the loudest.', '\\u7B2C\\u4E00\\u6B65\\u5F80\\u5F80\\u4E0D\\u662F\\u6700\\u96BE\\u7684\\uFF0C\\u53EA\\u662F\\u58F0\\u97F3\\u6700\\u5927\\u7684\\u3002'],\n    ['Trust yourself.', '\\u76F8\\u4FE1\\u81EA\\u5DF1\\u3002', 'You already know. You are only asking for permission.', '\\u4F60\\u65E9\\u5DF2\\u77E5\\u9053\\u7B54\\u6848\\uFF0C\\u53EA\\u662F\\u5728\\u5BFB\\u6C42\\u4E00\\u4EFD\\u8BB8\\u53EF\\u3002'],\n    ['Not yet.', '\\u8FD8\\u4E0D\\u662F\\u65F6\\u5019\\u3002', 'The timing you resist is often the timing you need.', '\\u4F60\\u6240\\u6297\\u62D2\\u7684\\u65F6\\u673A\\uFF0C\\u5F80\\u5F80\\u6B63\\u662F\\u4F60\\u9700\\u8981\\u7684\\u65F6\\u673A\\u3002'],\n    ['Yes.', '\\u662F\\u7684\\u3002', 'Some doors open only when you finally choose to knock.', '\\u6709\\u4E9B\\u95E8\\uFF0C\\u53EA\\u6709\\u5F53\\u4F60\\u7EC8\\u4E8E\\u9009\\u62E9\\u53E9\\u54CD\\u65F6\\u624D\\u4F1A\\u6253\\u5F00\\u3002'],\n    ['Rest.', '\\u4F11\\u606F\\u3002', 'You cannot pour from a well you never allow to fill.', '\\u4ECE\\u4E0D\\u84C4\\u6EE1\\u7684\\u4E95\\uFF0C\\u5012\\u4E0D\\u51FA\\u6C34\\u6765\\u3002'],\n    ['Look again.', '\\u518D\\u770B\\u4E00\\u6B21\\u3002', 'What you seek may be hidden inside what you overlooked.', '\\u4F60\\u6240\\u5BFB\\u627E\\u7684\\uFF0C\\u4E5F\\u8BB8\\u5C31\\u85CF\\u5728\\u4F60\\u5FFD\\u7565\\u4E4B\\u5904\\u3002'],\n    ['Speak the truth.', '\\u8BF4\\u51FA\\u771F\\u76F8\\u3002', 'Silence protects comfort. Honesty protects you.', '\\u6C89\\u9ED8\\u5B88\\u62A4\\u7684\\u662F\\u5B89\\u9038\\uFF0C\\u8BDA\\u5B9E\\u5B88\\u62A4\\u7684\\u662F\\u4F60\\u81EA\\u5DF1\\u3002'],\n    ['Stay.', '\\u7559\\u4E0B\\u3002', 'Not everything worth having asks you to move.', '\\u5E76\\u975E\\u6240\\u6709\\u503C\\u5F97\\u62E5\\u6709\\u7684\\uFF0C\\u90FD\\u8981\\u4F60\\u79BB\\u5F00\\u3002'],\n    ['Release the fear.', '\\u91CA\\u653E\\u6050\\u60E7\\u3002', 'Fear is only imagination pointed in the wrong direction.', '\\u6050\\u60E7\\u53EA\\u662F\\u60F3\\u8C61\\u529B\\u6307\\u9519\\u4E86\\u65B9\\u5411\\u3002'],\n    ['Follow the quiet voice.', '\\u542C\\u4ECE\\u5FAE\\u5F31\\u7684\\u58F0\\u97F3\\u3002', 'The loudest thoughts are rarely the wisest ones.', '\\u6700\\u55A7\\u95F9\\u7684\\u5FF5\\u5934\\uFF0C\\u5F88\\u5C11\\u662F\\u6700\\u667A\\u6167\\u7684\\u3002'],\n    ['It will pass.', '\\u4E00\\u5207\\u90FD\\u4F1A\\u8FC7\\u53BB\\u3002', 'Nothing that feels permanent tonight will feel the same by morning.', '\\u4ECA\\u591C\\u770B\\u4F3C\\u6C38\\u6052\\u7684\\u4E00\\u5207\\uFF0C\\u5230\\u4E86\\u6E05\\u6668\\u90FD\\u4F1A\\u4E0D\\u540C\\u3002'],\n    ['Choose peace.', '\\u9009\\u62E9\\u5E73\\u9759\\u3002', 'Being right is often lonelier than being kind.', '\\u4E89\\u5BF9\\u9519\\uFF0C\\u5F80\\u5F80\\u6BD4\\u5584\\u826F\\u66F4\\u5B64\\u72EC\\u3002'],\n    ['Walk away.', '\\u79BB\\u5F00\\u3002', 'Some things end so that you can finally begin.', '\\u6709\\u4E9B\\u4E8B\\u60C5\\u7ED3\\u675F\\uFF0C\\u662F\\u4E3A\\u4E86\\u8BA9\\u4F60\\u7EC8\\u4E8E\\u80FD\\u591F\\u5F00\\u59CB\\u3002'],\n    ['Be patient.', '\\u4FDD\\u6301\\u8010\\u5FC3\\u3002', 'Growth is quiet. Do not mistake stillness for standing still.', '\\u6210\\u957F\\u662F\\u5B89\\u9759\\u7684\\uFF0C\\u522B\\u628A\\u6C89\\u9759\\u8BEF\\u8BA4\\u4F5C\\u505C\\u6EDE\\u3002'],\n    ['Say yes to the unknown.', '\\u5411\\u672A\\u77E5\\u8BF4\\u662F\\u3002', 'Certainty is comfortable. Wonder is alive.', '\\u786E\\u5B9A\\u4EE4\\u4EBA\\u5B89\\u5FC3\\uFF0C\\u597D\\u5947\\u5374\\u8BA9\\u4EBA\\u9C9C\\u6D3B\\u3002'],\n    ['Forgive.', '\\u539F\\u8C05\\u3002', 'Carrying the weight was never a punishment for them.', '\\u80CC\\u8D1F\\u90A3\\u4EFD\\u91CD\\u91CF\\uFF0C\\u4ECE\\u6765\\u90FD\\u4E0D\\u662F\\u5BF9\\u4ED6\\u4EBA\\u7684\\u60E9\\u7F5A\\u3002'],\n    ['Simplify.', '\\u5316\\u7E41\\u4E3A\\u7B80\\u3002', 'Clarity is not found by adding, but by removing.', '\\u6E05\\u6670\\u4E0D\\u6765\\u81EA\\u589E\\u6DFB\\uFF0C\\u800C\\u6765\\u81EA\\u820D\\u5F03\\u3002'],\n    ['Listen.', '\\u5012\\u542C\\u3002', 'The answer may arrive in another\\u2019s voice.', '\\u7B54\\u6848\\u4E5F\\u8BB8\\u4F1A\\u501F\\u7531\\u4ED6\\u4EBA\\u4E4B\\u53E3\\u5230\\u6765\\u3002'],\n    ['Take the risk.', '\\u5192\\u8FD9\\u4E2A\\u9669\\u3002', 'Regret is heavier than failure ever was.', '\\u9057\\u61BE\\uFF0C\\u8FDC\\u6BD4\\u5931\\u8D25\\u66F4\\u6C89\\u91CD\\u3002'],\n    ['Return to yourself.', '\\u56DE\\u5230\\u81EA\\u5DF1\\u3002', 'You drifted, not lost. The way back is always open.', '\\u4F60\\u53EA\\u662F\\u6F02\\u8FDC\\u4E86\\uFF0C\\u5E76\\u672A\\u8FF7\\u5931\\u3002\\u5F52\\u9014\\u59CB\\u7EC8\\u655E\\u5F00\\u3002'],\n    ['Breathe.', '\\u547C\\u5438\\u3002', 'This moment asks for your presence, not your solution.', '\\u6B64\\u523B\\u9700\\u8981\\u7684\\u662F\\u4F60\\u7684\\u4E34\\u5728\\uFF0C\\u800C\\u975E\\u4F60\\u7684\\u7B54\\u6848\\u3002'],\n    ['Believe it.', '\\u76F8\\u4FE1\\u5427\\u3002', 'Doubt has protected you long enough. Let hope have a turn.', '\\u6000\\u7591\\u5DF2\\u4FDD\\u62A4\\u4F60\\u591F\\u4E45\\u4E86\\uFF0C\\u8BA9\\u5E0C\\u671B\\u4E5F\\u6765\\u8BD5\\u4E00\\u6B21\\u3002'],\n    ['Trust the process.', '相信过程。', 'You are not behind. You are exactly where the lesson lives.', '你并没有落后，你正处在课题所在之处。'],\n    ['Ask for help.', '寻求帮助。', 'Needing others is not weakness. It is how we are made.', '需要他人并非软弱，那本就是我们的天性。'],\n    ['Slow down.', '慢下来。', 'Rushing rarely gets you there faster. It only gets you there tired.', '匆忙很少让你更快到达，只会让你到得疲惫。'],\n    ['Keep going.', '继续前行。', 'The path clears for those who keep walking it.', '路，会为持续走下去的人渐渐清晰。'],\n    ['Look within.', '向内看。', 'The map you keep searching for was folded inside you all along.', '你苦苦寻找的地图，一直折叠在你心里。'],\n    ['Choose love.', '选择爱。', 'Fear asks what you might lose. Love asks what you might give.', '恐惧问你会失去什么，爱问你能给予什么。'],\n    ['Say no.', '学会拒绝。', 'Every no you honour is a yes to yourself.', '你守住的每一次拒绝，都是对自己的一次应允。'],\n    ['Make space.', '腾出空间。', 'Something new cannot enter a life that is already full.', '一颗已经装满的心，容不下新的事物。'],\n    ['Start small.', '从小处开始。', 'A mountain is only ever moved one stone at a time.', '再高的山，也只能一块石头一块石头地移走。'],\n    ['Be honest.', '诚实以对。', 'The truth costs less now than the lie will cost later.', '此刻的真话，比日后的谎言代价更小。'],\n    ['Let them go.', '放他们走。', 'Holding someone in place has never once made them stay.', '把一个人强留原地，从未真正留住过谁。'],\n    ['Trust your gut.', '相信直觉。', 'Your first feeling knew before your mind found the words.', '在头脑找到言语之前，你的第一感觉早已知晓。'],\n    ['Give it time.', '交给时间。', 'Some wounds close quietly, on a schedule that is not yours.', '有些伤口会悄然愈合，按着并非你的时间表。'],\n    ['Come home.', '回家。', 'The longest journey is often the one back to yourself.', '最漫长的旅程，往往是回到自己的那一段。'],\n    ['Open your hands.', '松开手。', 'You cannot receive what you refuse to stop clutching.', '紧攥不放的手，接不住新的馈赠。'],\n    ['Be brave.', '勇敢一点。', 'Courage is not the absence of fear, but moving with it.', '勇气不是没有恐惧，而是带着恐惧前行。'],\n    ['Change course.', '改变方向。', 'Persistence is a virtue only when the direction is right.', '唯有方向正确时，坚持才是一种美德。'],\n    ['Stay soft.', '保持柔软。', 'The world will harden you if you let it. Do not let it.', '若你允许，世界会把你磨硬；请别允许。'],\n    ['Let it rest.', '让它沉淀。', 'Not every question needs an answer today.', '并非每个问题都需要在今天得到答案。'],\n    ['Follow the joy.', '追随喜悦。', 'What lights you up is not a distraction. It is a direction.', '让你心生光亮的事物，不是分心，而是方向。'],\n    ['Set it down.', '放下重担。', 'You were never meant to carry all of it alone.', '你从来就不必独自背负这一切。'],\n    ['Say it now.', '现在就说。', 'The words you swallow tonight may not have a tomorrow.', '你今夜咽下的话，也许再没有明天可说。'],\n    ['Trust again.', '再次相信。', 'A closed heart is safe, but it is also unlit.', '紧闭的心是安全的，却也是黯淡的。'],\n    ['Look up.', '抬起头。', 'You have stared at the fall so long you forgot the sky.', '你盯着跌落看得太久，忘了头顶还有天空。'],\n    ['Do less.', '做得少一点。', 'Not everything worth doing is worth doing now.', '值得做的事，未必都值得现在就做。'],\n    ['Trust the quiet.', '安于静默。', 'Stillness is not empty. It is where answers gather.', '静默并非空无，那是答案汇聚之处。'],\n    ['Choose yourself.', '选择自己。', 'You have poured into everyone. Save a little for the well.', '你为所有人倾注，也留一点给自己的井。'],\n    ['It is enough.', '已经足够。', 'You have done more than you give yourself credit for.', '你做到的，远比你愿意承认的要多。'],\n    ['Stay curious.', '保持好奇。', 'Wonder keeps the heart younger than any answer can.', '好奇让心保持年轻，胜过任何答案。'],\n    ['Stop proving.', '无需证明。', 'You do not owe the world an explanation for your peace.', '你无需为自己的平静，向世界交代。'],\n    ['Take one step.', '迈出一步。
